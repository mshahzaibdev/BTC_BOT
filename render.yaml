services:
  - type: web
    name: ict-discord-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: SIGNAL_CHANNEL_ID
        sync: false
      - key: CHECK_INTERVAL_MINUTES
        value: 15
      - key: SCALER_PATH
        value: ./scaler.pkl
      - key: KMEANS_PATH
        value: ./kmeans.pkl
      - key: SWING_LENGTH
        value: 15
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
